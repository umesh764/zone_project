{% extends "base.html" %}

{% block title %}Verify OTP - Zone Pay{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Verify OTP</h2>
                <p>Enter the 6-digit code sent to your mobile</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.verify_otp') }}" class="auth-form">
                <div class="form-group">
                    <label for="otp">OTP Code</label>
                    <input type="text" id="otp" name="otp" class="form-control" 
                           pattern="[0-9]{6}" maxlength="6" placeholder="000000" required>
                </div>
                
                <button type="submit" class="btn-submit">Verify</button>
            </form>
            
            <div class="auth-footer">
                Didn't receive OTP? <a href="{{ url_for('auth.resend_otp') }}">Resend</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
