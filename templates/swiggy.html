{% extends "base.html" %}
{% block title %}Swiggy - Zone{% endblock %}
{% block content %}
<style>
    .platform-section {
        padding: 2rem;
        background: linear-gradient(135deg, #fc8019 0%, #ff9f4b 100%);
        min-height: 100vh;
    }
    .platform-container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .platform-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .platform-header h1 {
        color: #fc8019;
        font-size: 2.5rem;
    }
    .coming-soon {
        text-align: center;
        padding: 3rem;
        background: #f8f9fa;
        border-radius: 15px;
    }
</style>
<section class="platform-section">
    <div class="platform-container">
        <div class="platform-header">
            <h1><i class="fas fa-utensils"></i> Swiggy</h1>
        </div>
        <div class="coming-soon">
            <h2>🚀 Swiggy Coming Soon!</h2>
            <p>Food delivery from your favorite restaurants</p>
            <p>Get 20% cashback on first 5 orders</p>
            <a href="/shopping" class="btn" style="display:inline-block; margin-top:1rem; padding:0.75rem 2rem; background:#fc8019; color:white; text-decoration:none; border-radius:5px;">Back to Shopping</a>
        </div>
    </div>
</section>
{% endblock %}
