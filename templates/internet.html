{% extends "base.html" %}

{% block title %}Internet Bill - Zone{% endblock %}

{% block content %}
<style>
    .bill-section {
        padding: 2rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .bill-container {
        max-width: 500px;
        width: 100%;
    }

    .bill-card {
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
        from {
            transform: translateY(20px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .bill-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .bill-header h2 {
        font-size: 2rem;
        background: linear-gradient(135deg, #FF6B35, #FF4500);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
    }

    .bill-header p {
        color: #666;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #333;
    }

    .form-group select,
    .form-group input {
        width: 100%;
        padding: 1rem;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-group select:focus,
    .form-group input:focus {
        outline: none;
        border-color: #FF6B35;
        box-shadow: 0 0 0 4px rgba(255,107,53,0.1);
    }

    .btn-submit {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #17a2b8, #138496);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(23,162,184,0.3);
    }

    .operator-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        margin-top: 2rem;
    }

    .operator-item {
        text-align: center;
        padding: 1rem;
        background: #f8f9fa;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .operator-item:hover {
        background: linear-gradient(135deg, #17a2b8, #138496);
        color: white;
        transform: scale(1.05);
    }

    .operator-item i {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        color: #17a2b8;
    }

    .operator-item:hover i {
        color: white;
    }

    .operator-item span {
        display: block;
        font-weight: 600;
    }
</style>

<section class="bill-section">
    <div class="bill-container">
        <div class="bill-card">
            <div class="bill-header">
                <h2><i class="fas fa-wifi"></i> Internet Bill</h2>
                <p>Pay your internet connection bill</p>
            </div>

            <form method="POST" action="{{ url_for('bills.internet') }}">
             <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Customer ID</label>
                    <input type="text" name="customer_id" placeholder="Enter your customer ID" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-tower-cell"></i> Operator</label>
                    <select name="operator" required>
                        <option value="">Select Operator</option>
                        {% for op in operators %}
                        <option value="{{ op }}">{{ op }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-rupee-sign"></i> Amount</label>
                    <input type="number" name="amount" min="1" step="1" placeholder="Enter bill amount" required>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-check-circle"></i> Pay Bill
                </button>
            </form>

            <div class="operator-grid">
                <div class="operator-item" onclick="selectOperator('JioFiber')">
                    <i class="fas fa-wifi"></i>
                    <span>JioFiber</span>
                </div>
                <div class="operator-item" onclick="selectOperator('Airtel Xstream')">
                    <i class="fas fa-satellite-dish"></i>
                    <span>Airtel</span>
                </div>
                <div class="operator-item" onclick="selectOperator('ACT Fibernet')">
                    <i class="fas fa-bolt"></i>
                    <span>ACT</span>
                </div>
                <div class="operator-item" onclick="selectOperator('Hathway')">
                    <i class="fas fa-tv"></i>
                    <span>Hathway</span>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    function selectOperator(operator) {
        document.querySelector('select[name="operator"]').value = operator;
    }
</script>
{% endblock %}
