{% extends "base.html" %}
{% block title %}Car Insurance - Zone{% endblock %}
{% block content %}
<style>
    .insurance-section { padding:2rem; background:linear-gradient(135deg,#ff6b35,#ff4500); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .insurance-card { background:white; border-radius:20px; padding:3rem; text-align:center; max-width:600px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    .provider-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; margin:2rem 0; }
    .provider { background:#f8f9fa; padding:1rem; border-radius:8px; text-decoration:none; color:#333; display:block; }
    .provider:hover { background:#FF6B35; color:white; }
</style>
<section class="insurance-section">
    <div class="insurance-card">
        <h1>🚗 Car Insurance</h1>
        <div class="provider-grid">
            <a href="https://www.icicilombard.com" target="_blank" class="provider">ICICI Lombard</a>
            <a href="https://www.bajajallianz.com" target="_blank" class="provider">Bajaj Allianz</a>
            <a href="https://www.acko.com" target="_blank" class="provider">Acko</a>
            <a href="https://www.hdfcergo.com" target="_blank" class="provider">HDFC Ergo</a>
            <a href="https://www.tatamotorsinsurance.com" target="_blank" class="provider">Tata AIG</a>
            <a href="https://www.royalsundaram.in" target="_blank" class="provider">Royal Sundaram</a>
        </div>
        <a href="/insurance" class="back-link">← Back to Insurance</a>
    </div>
</section>
{% endblock %}
