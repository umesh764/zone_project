{% extends "base.html" %}
{% block title %}Snapdeal - Zone{% endblock %}
{% block content %}
<style>
    .platform-section { padding:2rem; background:linear-gradient(135deg,#e43b3b,#b02e2e); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .platform-card { background:white; border-radius:20px; padding:3rem; text-align:center; max-width:600px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    .platform-icon { font-size:5rem; margin-bottom:1rem; }
    .platform-title { font-size:2.5rem; color:#e43b3b; margin-bottom:1rem; }
    .btn-visit { display:inline-block; padding:1rem 3rem; background:#e43b3b; color:white; text-decoration:none; border-radius:50px; }
</style>
<section class="platform-section">
    <div class="platform-card">
        <div class="platform-icon">⚡</div>
        <h1 class="platform-title">Snapdeal</h1>
        <p>Online shopping for electronics, fashion & more</p>
        <a href="https://www.snapdeal.com" target="_blank" class="btn-visit">Visit Snapdeal →</a>
    </div>
</section>
{% endblock %}
