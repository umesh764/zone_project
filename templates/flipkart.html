{% extends "base.html" %}
{% block title %}Flipkart - Zone{% endblock %}
{% block content %}
<style>
    .platform-section {
        padding: 2rem;
        background: linear-gradient(135deg, #2874f0 0%, #ffce00 100%);
        min-height: 100vh;
    }
    .platform-container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .platform-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .platform-header h1 {
        color: #2874f0;
        font-size: 2.5rem;
    }
    .coming-soon {
        text-align: center;
        padding: 3rem;
        background: #f8f9fa;
        border-radius: 15px;
    }
</style>
<section class="platform-section">
    <div class="platform-container">
        <div class="platform-header">
            <h1><i class="fas fa-shopping-cart"></i> Flipkart</h1>
        </div>
        <div class="coming-soon">
            <h2>🚀 Flipkart Store Coming Soon!</h2>
            <p>We are integrating with Flipkart Affiliate API</p>
            <p>Get up to 12% cashback on every purchase</p>
            <a href="/shopping" class="btn" style="display:inline-block; margin-top:1rem; padding:0.75rem 2rem; background:#2874f0; color:white; text-decoration:none; border-radius:5px;">Back to Shopping</a>
        </div>
    </div>
</section>
{% endblock %}
