{% extends "base.html" %}

{% block title %}Property Tax - Zone{% endblock %}

{% block content %}
<style>
    .tax-section {
        padding: 2rem;
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .tax-container {
        max-width: 500px;
        width: 100%;
    }
    .tax-card {
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .tax-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .tax-header h2 {
        font-size: 2rem;
        background: linear-gradient(135deg, #f093fb, #f5576c);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .form-group {
        margin-bottom: 1.5rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
    }
    .form-group input {
        width: 100%;
        padding: 1rem;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
    }
    .btn-submit {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #f093fb, #f5576c);
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
</style>
<section class="tax-section">
    <div class="tax-container">
        <div class="tax-card">
            <div class="tax-header">
                <h2><i class="fas fa-home"></i> Property Tax</h2>
                <p>Pay your property tax online</p>
            </div>
            <form method="POST">
             <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>Property ID</label>
                    <input type="text" name="property_id" placeholder="Enter property ID" required>
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" name="amount" placeholder="Enter amount" required>
                </div>
                <button type="submit" class="btn-submit">Pay Tax</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
