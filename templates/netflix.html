{% extends "base.html" %}
{% block title %}Netflix - Zone{% endblock %}
{% block content %}
<style>
    .ott-section { padding:2rem; background:linear-gradient(135deg,#e50914,#b20710); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .ott-card { background:white; border-radius:20px; padding:3rem; text-align:center; max-width:600px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    .plan-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin:2rem 0; }
    .plan { background:#f8f9fa; padding:1rem; border-radius:8px; }
    .price { font-size:1.5rem; color:#e50914; font-weight:700; }
</style>
<section class="ott-section">
    <div class="ott-card">
        <h1>🎬 Netflix</h1>
        <div class="plan-grid">
            <div class="plan">
                <h3>Mobile</h3>
                <div class="price">₹149</div>
                <div>/month</div>
            </div>
            <div class="plan">
                <h3>Basic</h3>
                <div class="price">₹199</div>
                <div>/month</div>
            </div>
            <div class="plan">
                <h3>Premium</h3>
                <div class="price">₹649</div>
                <div>/month</div>
            </div>
        </div>
        <a href="https://www.netflix.com" target="_blank" style="display:inline-block; padding:1rem 3rem; background:#e50914; color:white; text-decoration:none; border-radius:50px;">Subscribe Now →</a>
        <div style="margin-top:2rem;">
            <a href="/entertainment">← Back</a>
        </div>
    </div>
</section>
{% endblock %}
