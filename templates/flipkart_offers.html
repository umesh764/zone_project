{% extends "base.html" %}

{% block title %}Flipkart Offers - Zone{% endblock %}

{% block content %}
<style>
    .deals-section {
        padding: 2rem;
        background: linear-gradient(135deg, #2874f0 0%, #ffce00 100%);
        min-height: 100vh;
    }
    .deals-container {
        max-width: 1200px;
        margin: 0 auto;
    }
    .deals-header {
        text-align: center;
        margin-bottom: 2rem;
        color: white;
    }
    .deals-header h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
    }
    .coming-soon {
        background: white;
        border-radius: 15px;
        padding: 3rem;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
</style>

<section class="deals-section">
    <div class="deals-container">
        <div class="deals-header">
            <h1><i class="fas fa-shopping-cart"></i> Flipkart Offers</h1>
            <p>Best deals from Flipkart</p>
        </div>

        <div class="coming-soon">
            <h2>🚀 Flipkart Offers Coming Soon!</h2>
            <p>We are integrating with Flipkart Affiliate API</p>
            <a href="/shopping" class="btn" style="display: inline-block; margin-top: 1rem; padding: 0.75rem 2rem; background: #2874f0; color: white; text-decoration: none; border-radius: 5px;">Back to Shopping</a>
        </div>
    </div>
</section>
{% endblock %}
