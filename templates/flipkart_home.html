{% extends "base.html" %}

{% block title %}Flipkart - Zone{% endblock %}

{% block content %}
<style>
    .flipkart-section {
        padding: 2rem;
        background: linear-gradient(135deg, #2874f0 0%, #1c4da0 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .flipkart-card {
        background: white;
        border-radius: 20px;
        padding: 3rem;
        text-align: center;
        max-width: 600px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .flipkart-logo {
        font-size: 4rem;
        color: #2874f0;
        margin-bottom: 1rem;
    }
    .flipkart-title {
        font-size: 2.5rem;
        color: #2874f0;
        margin-bottom: 1rem;
    }
    .feature-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        margin: 2rem 0;
    }
    .feature-item {
        background: #f8f9fa;
        padding: 1rem;
        border-radius: 8px;
        text-align: center;
    }
    .btn-visit {
        display: inline-block;
        padding: 1rem 3rem;
        background: #2874f0;
        color: white;
        text-decoration: none;
        border-radius: 50px;
        font-size: 1.2rem;
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
    }
    .btn-visit:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(40,116,240,0.3);
    }
</style>

<section class="flipkart-section">
    <div class="flipkart-card">
        <div class="flipkart-logo">
            <i class="fas fa-shopping-cart"></i>
        </div>
        <h1 class="flipkart-title">Flipkart</h1>
        <p>India's largest online store - Electronics, Fashion, Grocery & more</p>
        
        <div class="feature-grid">
            <div class="feature-item">
                <i class="fas fa-mobile-alt"></i>
                <p>Electronics</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-tshirt"></i>
                <p>Fashion</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-home"></i>
                <p>Home & Furniture</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-shopping-basket"></i>
                <p>Grocery</p>
            </div>
        </div>

        <a href="https://www.flipkart.com" target="_blank" class="btn-visit">
            Visit Flipkart →
        </a>
        
        <div style="margin-top: 1rem;">
            <small>Earn up to 12% cashback on every purchase</small>
        </div>
    </div>
</section>
{% endblock %}
