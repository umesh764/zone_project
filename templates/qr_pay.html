{% extends "base.html" %}
{% block title %}QR Pay - Zone{% endblock %}
{% block content %}
<style>
    .qr-section { padding:2rem; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; }
    .qr-card { background:white; border-radius:20px; padding:2rem; max-width:500px; margin:0 auto; text-align:center; }
    .qr-placeholder { width:200px; height:200px; background:#f0f0f0; margin:1rem auto; display:flex; align-items:center; justify-content:center; font-size:3rem; }
</style>
<section class="qr-section">
    <div class="qr-card">
        <h1>🔳 QR Pay</h1>
        <div class="qr-placeholder">📱</div>
        <p>Scan this QR code to make payment</p>
        <a href="/payment">← Back to Payment</a>
    </div>
</section>
{% endblock %}
