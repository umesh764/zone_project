{% extends "base.html" %}
{% block title %}1mg - Zone{% endblock %}
{% block content %}
<style>
    .platform-section { padding:2rem; background:linear-gradient(135deg,#ff6b6b,#c43a3a); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .platform-card { background:white; border-radius:20px; padding:3rem; text-align:center; max-width:600px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    .platform-icon { font-size:5rem; margin-bottom:1rem; }
    .platform-title { font-size:2.5rem; color:#ff6b6b; margin-bottom:1rem; }
    .btn-visit { display:inline-block; padding:1rem 3rem; background:#ff6b6b; color:white; text-decoration:none; border-radius:50px; }
</style>
<section class="platform-section">
    <div class="platform-card">
        <div class="platform-icon">💊</div>
        <h1 class="platform-title">1mg</h1>
        <p>Online medicine delivery and healthcare</p>
        <a href="https://www.1mg.com" target="_blank" class="btn-visit">Visit 1mg →</a>
    </div>
</section>
{% endblock %}
