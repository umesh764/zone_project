{% extends "base.html" %}
{% block title %}Blinkit - Zone{% endblock %}
{% block content %}
<style>
    .platform-section {
        padding: 2rem;
        background: linear-gradient(135deg, #f7b731 0%, #e67e22 100%);
        min-height: 100vh;
    }
    .platform-container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .platform-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .platform-header h1 {
        color: #e67e22;
        font-size: 2.5rem;
    }
    .coming-soon {
        text-align: center;
        padding: 3rem;
        background: #f8f9fa;
        border-radius: 15px;
    }
</style>
<section class="platform-section">
    <div class="platform-container">
        <div class="platform-header">
            <h1><i class="fas fa-bolt"></i> Blinkit</h1>
            <p>10 Minute Delivery</p>
        </div>
        <div class="coming-soon">
            <h2>🚀 Blinkit Coming Soon!</h2>
            <p>Groceries delivered in 10 minutes</p>
            <p>Get 5% cashback on every order</p>
            <a href="/shopping" class="btn" style="display:inline-block; margin-top:1rem; padding:0.75rem 2rem; background:#e67e22; color:white; text-decoration:none; border-radius:5px;">Back to Shopping</a>
        </div>
    </div>
</section>
{% endblock %}
